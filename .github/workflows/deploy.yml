name: Deploy to PlanetHoster

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '**/*.md'
  workflow_dispatch: # Allows manual triggering from any branch
    inputs:
      test_mode:
        description: 'Test mode (only test connection, no deployment)'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Test FTP Connection
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        echo "🔍 Testing FTP connection first..."
        sudo apt-get update
        sudo apt-get install -y lftp
        
        echo "Testing connection to: ${FTP_SERVER}"
        echo "Username: ${FTP_USERNAME}"
        echo "Password: [HIDDEN]"
        
        # URL-form open() so passwords with $ , ! etc. cannot break bash; @ in username is percent-encoded.
        python3 << 'PY'
        import os
        from pathlib import Path
        from urllib.parse import quote

        server = os.environ["FTP_SERVER"].strip()
        if server.lower().startswith("ftp://"):
            server = server[6:].strip()
        server = server.rstrip("/")

        user = os.environ["FTP_USERNAME"].strip()
        password = os.environ["FTP_PASSWORD"].replace("\r", "").strip()

        url = f"ftp://{quote(user, safe='')}:{quote(password, safe='')}@{server}/"

        lines = [
            "set ftp:ssl-allow no",
            "set ftp:passive-mode on",
            "set net:timeout 30",
            "set net:max-retries 3",
            "set net:connection-limit 1",
            "set ftp:list-options -a",
            f"open {url}",
            "pwd",
            "ls -la | head -10",
            "cd public_html",
            "pwd",
            "ls -la | head -10",
            "quit",
        ]
        Path("test_ftp.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
        PY
        
        echo "Running FTP connection test..."
        if lftp -f test_ftp.txt 2>&1; then
          echo "✅ FTP connection successful!"
        else
          echo "❌ FTP connection failed!"
          echo ""
          echo "Troubleshooting steps:"
          echo "1. FTP_SERVER should be like node36-ca.n0c.com (no ftp:// prefix)"
          echo "2. FTP_USERNAME must be full N0C form, e.g. user@yourdomain.ext"
          echo "3. Secrets: Edit → remove stray spaces/newlines; avoid pasting trailing line breaks."
          echo "4. If password contains only safe chars, \$ and commas broke the old workflow—this run uses encoding."
          exit 1
        fi
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: projects/javascript/package-lock.json
        
    - name: Install dependencies
      working-directory: projects/javascript
      run: npm ci
      
    - name: Build React app
      working-directory: projects/javascript
      run: CI=false npm run build
      
    - name: Prepare deployment files
      working-directory: projects/javascript
      run: |
        echo "📦 Preparing deployment files..."
        
        # Create deployment directory
        mkdir -p deployment/public_html
        
        # Step 1: Copy React build files to public_html root
        echo "📁 Copying React build files..."
        cp -r build/* deployment/public_html/
        
        # Step 2: Copy PHP files to public_html root
        echo "📁 Copying PHP files..."
        cp server/*.php deployment/public_html/ 2>/dev/null || echo "No PHP files found in server/"
        
        # Step 3: Copy .htaccess for React Router
        echo "📁 Copying .htaccess..."
        if [ -f .htaccess ]; then
          cp .htaccess deployment/public_html/
        else
          echo "⚠️  .htaccess not found - React Router may not work correctly"
        fi
        
        # Verify critical files exist
        echo "✅ Verifying deployment structure..."
        echo "Files in deployment/public_html/:"
        ls -la deployment/public_html/ | head -20
        echo ""
        echo "Checking for critical files:"
        [ -f deployment/public_html/index.html ] && echo "✅ index.html found" || echo "❌ index.html missing"
        [ -d deployment/public_html/assets ] && echo "✅ assets/ folder found" || echo "❌ assets/ folder missing"
        [ -d deployment/public_html/static ] && echo "✅ static/ folder found" || echo "❌ static/ folder missing"
        [ -f deployment/public_html/.htaccess ] && echo "✅ .htaccess found" || echo "⚠️  .htaccess missing"
        echo ""
        echo "Checking index.html for script tags:"
        if [ -f deployment/public_html/index.html ]; then
          if grep -q "static/js/main" deployment/public_html/index.html; then
            echo "✅ index.html contains static/js/main script tag"
            grep "static/js/main" deployment/public_html/index.html
          else
            echo "❌ index.html MISSING static/js/main script tag!"
            echo "First 50 lines of index.html:"
            head -50 deployment/public_html/index.html
          fi
        fi
        echo ""
        echo "Checking static folder contents:"
        if [ -d deployment/public_html/static ]; then
          echo "✅ static/ folder exists"
          ls -la deployment/public_html/static/
          if [ -d deployment/public_html/static/js ]; then
            echo "✅ static/js/ folder exists"
            ls -la deployment/public_html/static/js/ | head -5
          else
            echo "❌ static/js/ folder missing!"
          fi
        else
          echo "❌ static/ folder missing!"
        fi
        
    - name: Deploy to PlanetHoster via LFTP
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y lftp
        
        echo "=== FILES TO UPLOAD ==="
        ls -la projects/javascript/deployment/public_html/
        echo "=== INDEX.HTML CONTENT (first 10 lines) ==="
        head -10 projects/javascript/deployment/public_html/index.html
        
        python3 << 'PY'
        import os
        from pathlib import Path
        from urllib.parse import quote

        server = os.environ["FTP_SERVER"].strip()
        if server.lower().startswith("ftp://"):
            server = server[6:].strip()
        server = server.rstrip("/")
        user = os.environ["FTP_USERNAME"].strip()
        password = os.environ["FTP_PASSWORD"].replace("\r", "").strip()
        url = f"ftp://{quote(user, safe='')}:{quote(password, safe='')}@{server}/"

        common_header = "\n".join(
            [
                "set ftp:ssl-allow no",
                "set ftp:passive-mode on",
                "set net:timeout 30",
                "set net:max-retries 3",
                "set net:connection-limit 1",
            ]
        )

        mirror_body = "\n".join(
            [
                common_header,
                f"open {url}",
                "cd public_html",
                "lcd projects/javascript/deployment/public_html",
                # Ignore mtime drift from rebuilds so unchanged large assets
                # (like photos copied into build/assets) do not re-upload each deploy.
                "mirror -R --verbose --ignore-time --exclude-glob .git* --exclude-glob node_modules* --exclude-glob .env*",
                "quit",
            ]
        )

        verify_body = "\n".join(
            [
                common_header,
                f"open {url}",
                "cd public_html",
                "ls -la",
                "quit",
            ]
        )

        Path("lftp_script.txt").write_text(mirror_body + "\n", encoding="utf-8")
        Path("verify_ftp.txt").write_text(verify_body + "\n", encoding="utf-8")
        PY

        lftp -f lftp_script.txt

        echo "=== VERIFYING UPLOAD ==="
        lftp -f verify_ftp.txt
